version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'composer'
    directory: '/'
    schedule:
      interval: 'daily'
    versioning-strategy: increase-if-necessary
    groups:
      minor-php-updates:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
