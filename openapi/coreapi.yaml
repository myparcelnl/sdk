'!include': 'common.yaml'

# OpenAPI Generator configuration
inputSpec: https://api.myparcel.nl/openapi.min.json
outputDir: src/Client/Generated/CoreApi
# Maps inline schema names to shorter, cleaner class names
inlineSchemaNameMappings:
  # Capabilities V2 - used in CapabilitiesMapper
  capabilities_post_capabilities_request_v2_recipient: CapabilitiesRecipientV2
  capabilities_post_capabilities_request_v2_sender: CapabilitiesSenderV2
  capabilities_post_capabilities_request_v2_options: CapabilitiesOptionsV2
  capabilities_post_capabilities_request_v2_physicalProperties: CapabilitiesPhysicalPropertiesV2
  capabilities_post_capabilities_request_v2_physicalProperties_height: PhysicalPropertiesHeightV2
  capabilities_post_capabilities_request_v2_physicalProperties_length: PhysicalPropertiesLengthV2
  capabilities_post_capabilities_request_v2_physicalProperties_width: PhysicalPropertiesWidthV2
  capabilities_post_capabilities_request_v2_physicalProperties_weight: PhysicalPropertiesWeightV2

  # Shipment V1.1 - test mappings
  shipment_post_shipments_request_v1_1_data_shipments_inner: ShipmentRequest
  shipment_post_shipments_request_v1_1_data_shipments_inner_secondary_shipments_inner: SecondaryShipmentRequest
typeMappings:
  # @todo remove once the upstream spec/codegen fix for the street pattern is available.
  # Maps the buggy ShipmentDefsShipmentRecipient to our fixed override class so that
  # all generated code (ObjectSerializer, API methods, models) uses the corrected version.
  ShipmentDefsShipmentRecipient: FixedShipmentRecipient
  ShipmentDefsShipmentSender: FixedShipmentSender
  # The upstream spec defines some properties as `type: "null"` which the PHP generator
  # maps to a literal class name 'Null'. ObjectSerializer then crashes with
  # "Class 'Null' not found". Mapping it to 'mixed' lets it pass through as-is.
  Null: mixed
  # The spec defines reference_identifier as ['null','integer','string'], causing the
  # generator to create an empty wrapper model RefShipmentReferenceIdentifier. This
  # loses data during deserialization. In practice it's always a nullable string.
  # @todo remove once the upstream spec fixes this to `type: string, nullable: true`.
  RefShipmentReferenceIdentifier: string
additionalProperties:
  '!include': 'commonProperties.yaml'
  packageName: MyParcelNL\Sdk\Client\Generated\CoreApi
  invokerPackage: MyParcelNL\Sdk\Client\Generated\CoreApi
